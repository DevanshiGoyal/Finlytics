<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="260" viewBox="0 0 1500 260" role="img" aria-labelledby="title desc">
  <title id="title">FinSight Hackathon Flow Architecture</title>
  <desc id="desc">Input Data to Prediction Engine to Forecasting Layer to Anomaly Detection to Explainability and AI Insights to Streamlit Dashboard</desc>

  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5f6470" />
    </marker>
    <style>
      .box {
        fill: #f6f8fb;
        stroke: #31456a;
        stroke-width: 2;
        rx: 14;
      }
      .label {
        font-family: Segoe UI, Arial, sans-serif;
        font-size: 18px;
        font-weight: 600;
        fill: #1f2937;
      }
      .arrow {
        stroke: #5f6470;
        stroke-width: 3;
        fill: none;
        marker-end: url(#arrow);
      }
    </style>
  </defs>

  <rect class="box" x="30" y="80" width="200" height="100" />
  <text class="label" x="130" y="115" text-anchor="middle">Input Data</text>
  <text class="label" x="130" y="143" text-anchor="middle">Bank and Lending</text>

  <rect class="box" x="270" y="80" width="220" height="100" />
  <text class="label" x="380" y="115" text-anchor="middle">1. Prediction</text>
  <text class="label" x="380" y="143" text-anchor="middle">Engine</text>

  <rect class="box" x="530" y="80" width="220" height="100" />
  <text class="label" x="640" y="115" text-anchor="middle">2. Forecasting</text>
  <text class="label" x="640" y="143" text-anchor="middle">Layer</text>

  <rect class="box" x="790" y="80" width="220" height="100" />
  <text class="label" x="900" y="115" text-anchor="middle">3. Anomaly</text>
  <text class="label" x="900" y="143" text-anchor="middle">Detection</text>

  <rect class="box" x="1050" y="80" width="230" height="100" />
  <text class="label" x="1165" y="115" text-anchor="middle">4. Explainability</text>
  <text class="label" x="1165" y="143" text-anchor="middle">and AI Insights</text>

  <rect class="box" x="1320" y="80" width="150" height="100" />
  <text class="label" x="1395" y="115" text-anchor="middle">5. Streamlit</text>
  <text class="label" x="1395" y="143" text-anchor="middle">Dashboard</text>

  <line class="arrow" x1="230" y1="130" x2="268" y2="130" />
  <line class="arrow" x1="490" y1="130" x2="528" y2="130" />
  <line class="arrow" x1="750" y1="130" x2="788" y2="130" />
  <line class="arrow" x1="1010" y1="130" x2="1048" y2="130" />
  <line class="arrow" x1="1280" y1="130" x2="1318" y2="130" />
</svg>